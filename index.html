<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Stay Tuned</title>
    <style>
        /* CSS Στυλ */
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .bg-pink {
            /* Pink Gradient Background */
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            color: white;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .divider {
            height: 4px;
            width: 50px;
            background-color: white;
            margin: 20px auto;
            border-radius: 2px;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="bg-pink">
        <div class="container">
            <h1>Coming Soon</h1>
            <div class="divider"></div>
            <p>Ετοιμάζουμε κάτι όμορφο για εσάς. <br> Μείνετε συντονισμένοι!</p>
            
            <div class="footer">
                &copy; 2026 KYZ Nails
            </div>
        </div>
    </div>

</body>
</html>
